<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>SniperSight — Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
.bot-tab-banner{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:10px 14px;border:1px solid var(--border-soft);border-radius:8px;background:rgba(0,0,0,.4);margin-bottom:14px;flex-wrap:wrap}
.tab-switch{display:flex;gap:0;border:1px solid var(--border-soft);border-radius:8px;overflow:hidden}
.tab-switch button{background:rgba(0,0,0,.4);border:none;color:var(--fg-3);padding:8px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.18em;cursor:pointer;transition:all .15s;border-right:1px solid var(--border-soft)}
.tab-switch button:last-child{border-right:none}
.tab-switch button.active{background:var(--accent-bg);color:var(--accent);box-shadow:inset 0 -2px 0 var(--accent)}
.tab-switch button:hover:not(.active){background:rgba(255,255,255,.04);color:var(--fg)}

:root {
  --bg: oklch(0.18 0.008 120);
  --bg-2: oklch(0.22 0.010 125);
  --card: oklch(0.26 0.012 125);
  --card-2: oklch(0.30 0.012 125);
  --border: oklch(0.36 0.015 130);
  --border-soft: oklch(0.32 0.015 130 / 0.6);
  --fg: oklch(0.94 0.012 150);
  --fg-2: oklch(0.78 0.012 150);
  --fg-3: oklch(0.58 0.015 150);
  --fg-4: oklch(0.42 0.012 150);
  --green: #00ffaa;
  --green-soft: #4ade80;
  --green-bg: rgba(0,255,170,.10);
  --green-border: rgba(0,255,170,.30);
  --amber: #ffc266;
  --amber-2: #fbbf24;
  --amber-bg: rgba(251,191,36,.10);
  --amber-border: rgba(251,191,36,.35);
  --red: #ff6464;
  --red-2: #f87171;
  --red-bg: rgba(248,113,113,.10);
  --red-border: rgba(248,113,113,.35);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,.10);
  --blue-border: rgba(96,165,250,.30);
  --cyan: #22d3ee;
  --purple: #c084fc;
  /* accent applied dynamically via tweaks (green/amber/blue) */
  --accent: var(--green);
  --accent-bg: var(--green-bg);
  --accent-border: var(--green-border);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:'Inter',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;}
body{min-height:100vh;overflow-x:hidden;position:relative;}

/* ── Tactical background layers ─────────────────────────── */
.tactical-bg{position:fixed;inset:0;z-index:-10;pointer-events:none;overflow:hidden;}
.tactical-bg.off{display:none;}
.tactical-bg::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, oklch(0.14 0.010 120) 0%, oklch(0.10 0.008 120) 50%, oklch(0.13 0.010 120) 100%);
}
.tactical-bg .glow{
  position:absolute;inset:-20%;
  background:
    radial-gradient(ellipse 60% 40% at 20% 30%, color-mix(in oklch, var(--accent) 8%, transparent) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 75%, rgba(96,165,250,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, color-mix(in oklch, var(--accent) 4%, transparent) 0%, transparent 50%);
  animation:glowDrift 30s ease-in-out infinite;
}
@keyframes glowDrift{
  0%,100%{transform:translate(0,0) scale(1);opacity:.7;}
  50%{transform:translate(2%,-2%) scale(1.05);opacity:1;}
}
.tactical-bg .grid{
  position:absolute;inset:0;
  background-image:radial-gradient(circle at center, color-mix(in oklch, var(--accent) 22%, transparent) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:.06;
  animation:gridDrift 120s linear infinite;
}
@keyframes gridDrift{from{background-position:0 0}to{background-position:40px 0}}
.tactical-bg .scanline{
  position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg, transparent, color-mix(in oklch, var(--accent) 40%, transparent) 30%, color-mix(in oklch, var(--accent) 60%, transparent) 50%, color-mix(in oklch, var(--accent) 40%, transparent) 70%, transparent);
  box-shadow:0 0 18px color-mix(in oklch, var(--accent) 50%, transparent);
  animation:scanSweep 8s linear infinite;
}
@keyframes scanSweep{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
.tactical-bg .grain{
  position:absolute;inset:0;opacity:.04;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  animation:grainFlick .5s steps(2) infinite;
}
@keyframes grainFlick{0%,100%{opacity:.03}50%{opacity:.05}}

/* ── HUD type ───────────────────────────────────────────── */
.hud{font-family:'Share Tech Mono',ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;}
.term{font-family:'VT323',ui-monospace,monospace;letter-spacing:.04em;}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
.hud-glow{color:var(--accent);text-shadow:0 0 6px color-mix(in oklch, var(--accent) 60%, transparent), 0 0 14px color-mix(in oklch, var(--accent) 35%, transparent);}
.hud-glow-amber{color:var(--amber);text-shadow:0 0 6px rgba(255,194,102,.7),0 0 14px rgba(255,194,102,.35);}
.hud-glow-red{color:var(--red);text-shadow:0 0 6px rgba(255,100,100,.7),0 0 14px rgba(255,100,100,.35);}

/* ── Surfaces ───────────────────────────────────────────── */
.panel{
  position:relative;
  background:linear-gradient(135deg, rgba(0,0,0,.55) 0%, oklch(0.22 0.010 125 / .6) 100%);
  border:1px solid var(--border-soft);
  border-radius:14px;
  overflow:hidden;
}
.panel::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,.012) 2px 4px);
  z-index:1;
}
.panel.scanlines-off::before{display:none;}
.panel > *{position:relative;z-index:2;}

.panel-accent{
  border-color: color-mix(in oklch, var(--accent) 25%, var(--border-soft));
  box-shadow: 0 0 0 1px color-mix(in oklch, var(--accent) 8%, transparent), 0 8px 40px rgba(0,0,0,.4);
}
.panel-accent::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 80% 50% at 50% 0%, color-mix(in oklch, var(--accent) 8%, transparent) 0%, transparent 70%);
}

/* corner brackets */
.brackets::before,.brackets::after{
  content:'';position:absolute;width:14px;height:14px;border:1.5px solid color-mix(in oklch, var(--accent) 60%, transparent);pointer-events:none;
}
.brackets::before{top:6px;left:6px;border-right:none;border-bottom:none;}
.brackets::after{bottom:6px;right:6px;border-left:none;border-top:none;}

/* ── Tiny utilities ─────────────────────────────────────── */
.chip{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--border-soft);border-radius:999px;color:var(--fg-2);background:rgba(255,255,255,.04);}
.chip-accent{color:var(--accent);border-color:var(--accent-border);background:var(--accent-bg);}
.chip-green{color:var(--green-soft);border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.08);}
.chip-red{color:var(--red-2);border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.08);}
.chip-amber{color:var(--amber-2);border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.08);}
.chip-blue{color:var(--blue);border-color:rgba(96,165,250,.30);background:rgba(96,165,250,.08);}
.chip-purple{color:var(--purple);border-color:rgba(192,132,252,.30);background:rgba(192,132,252,.08);}

.divider{height:1px;background:linear-gradient(90deg, transparent, color-mix(in oklch, var(--accent) 30%, transparent) 50%, transparent);}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:9px 14px;border-radius:10px;
  font-family:'JetBrains Mono',monospace;font-weight:800;font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;
  border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--fg-2);cursor:pointer;
  transition:all .18s ease;
  user-select:none;
}
.btn:hover{background:rgba(255,255,255,.06);color:var(--fg);}
.btn-red{color:var(--red-2);border-color:rgba(248,113,113,.30);background:rgba(248,113,113,.10);}
.btn-red:hover{background:rgba(248,113,113,.18);color:#fff;}
.btn-orange{color:#fdba74;border-color:rgba(251,146,60,.30);background:rgba(251,146,60,.10);}
.btn-orange:hover{background:rgba(251,146,60,.18);color:#fff;}
.btn-green{color:var(--green-soft);border-color:rgba(74,222,128,.30);background:rgba(74,222,128,.10);}
.btn-green:hover{background:rgba(74,222,128,.18);color:#fff;}
.btn-cyan{
  color:#67e8f9;border:1px solid rgba(34,211,238,.4);
  background:linear-gradient(180deg,#164e63 0%,#0e3a4a 60%,#0a2d3a 100%);
  box-shadow:0 4px 0 0 #061e27, 0 0 12px rgba(34,211,238,.18), inset 0 1px 0 rgba(255,255,255,.07);
}
.btn-cyan:hover{filter:brightness(1.15);}
.btn-cyan:active{transform:translateY(1px);box-shadow:0 1px 0 0 #061e27, 0 0 8px rgba(34,211,238,.18);}
.btn-icon{padding:0;width:36px;height:36px;}

.metric-tile{
  background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  padding:14px 16px;
  position:relative;
  overflow:hidden;
}
.metric-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600;color:var(--fg-4);text-transform:uppercase;letter-spacing:.2em;margin-bottom:10px;}
.metric-value{font-family:'Share Tech Mono','JetBrains Mono',monospace;font-size:26px;font-weight:800;letter-spacing:-.01em;line-height:1;color:var(--fg);}
.metric-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-4);text-transform:uppercase;letter-spacing:.12em;margin-top:6px;}

/* ── Pulsing orb ─────────────────────────────────────────── */
.orb{position:relative;width:40px;height:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.orb .core{width:14px;height:14px;border-radius:50%;background:var(--green);box-shadow:0 0 18px var(--green);}
.orb .ping{position:absolute;inset:0;border-radius:50%;background:var(--green);opacity:.25;animation:ping 2.5s ease-out infinite;}
.orb .blur{position:absolute;inset:4px;border-radius:50%;background:var(--green);opacity:.35;filter:blur(5px);}
@keyframes ping{0%{transform:scale(.8);opacity:.45}80%,100%{transform:scale(2.2);opacity:0}}
.orb.amber .core{background:var(--amber-2);box-shadow:0 0 18px var(--amber-2);}
.orb.amber .ping,.orb.amber .blur{background:var(--amber-2);}
.orb.red .core{background:var(--red-2);box-shadow:0 0 18px var(--red-2);}
.orb.red .ping,.orb.red .blur{background:var(--red-2);}

/* ── Reticle ─────────────────────────────────────────────── */
.reticle{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:.18;}
.reticle.off{display:none;}
.reticle svg{width:120%;height:120%;}
.reticle .ring-rotate{animation:rRotate 45s linear infinite;transform-origin:center;}
.reticle .ring-rotate-rev{animation:rRotateRev 30s linear infinite;transform-origin:center;}
@keyframes rRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes rRotateRev{from{transform:rotate(360deg)}to{transform:rotate(0)}}

/* ── HUD progress bar (entry/SL/TP) ─────────────────────── */
.hud-prog{position:relative;height:6px;border-radius:3px;background:linear-gradient(90deg,#7f1d1d 0%,#3a1212 18%,#1d1d1d 30%,#1d1d1d 70%,#0e3326 82%,#065f46 100%);overflow:visible;}
.hud-prog .marker{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--green);box-shadow:0 0 10px var(--green);transform:translate(-50%,-50%);transition:left .8s cubic-bezier(.22,.9,.3,1);}
.hud-prog .tick{position:absolute;top:-3px;width:1px;height:12px;background:rgba(255,255,255,.3);}

/* ── Animations ─────────────────────────────────────────── */
@keyframes flashGreen{0%{background:rgba(0,255,170,0)}20%{background:rgba(0,255,170,.18)}100%{background:rgba(0,255,170,0)}}
@keyframes flashRed{0%{background:rgba(248,113,113,0)}20%{background:rgba(248,113,113,.18)}100%{background:rgba(248,113,113,0)}}
.flash-green{animation:flashGreen .9s ease-out;}
.flash-red{animation:flashRed .9s ease-out;}

@keyframes barShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.2}}
.cursor-blink{animation:blink 1s steps(2) infinite;}

@keyframes radarSweep{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── Layout ─────────────────────────────────────────────── */
.shell{max-width:1320px;margin:0 auto;padding:24px 28px 60px;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0 22px;border-bottom:1px solid var(--border-soft);margin-bottom:24px;}
.topbar .brand{display:flex;align-items:center;gap:14px;}
.brand-mark{width:34px;height:34px;border:1px solid var(--accent-border);border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--accent-bg);}
.brand-name{font-family:'Share Tech Mono',monospace;font-size:15px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg);}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-4);letter-spacing:.18em;text-transform:uppercase;}

.nav{display:flex;align-items:center;gap:4px;}
.nav a{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);padding:8px 12px;border-radius:8px;text-decoration:none;border:1px solid transparent;}
.nav a:hover{color:var(--fg);background:rgba(255,255,255,.04);}
.nav a.active{color:var(--accent);border-color:var(--accent-border);background:var(--accent-bg);}

/* page header */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:22px;}
.page-title{display:flex;align-items:center;gap:18px;}
.page-title .icon{width:54px;height:54px;border:1px solid var(--amber-border);border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(251,191,36,.06);}
.page-title h1{font-family:'Share Tech Mono',monospace;font-size:32px;letter-spacing:.2em;text-transform:uppercase;margin:0;line-height:1;color:var(--amber);text-shadow:0 0 14px rgba(251,191,36,.35);}
.page-title .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg-3);letter-spacing:.18em;text-transform:uppercase;margin-top:6px;}
.page-title h1.live{color:var(--red);text-shadow:0 0 14px rgba(248,113,113,.45);}

.layout-grid{display:grid;grid-template-columns:1.6fr .9fr;gap:18px;align-items:start;}
.layout-grid.single{grid-template-columns:1fr;}
.col{display:flex;flex-direction:column;gap:18px;min-width:0;}

@media (max-width: 980px){
  .shell{padding:14px 14px 80px;}
  .topbar{flex-wrap:wrap;}
  .nav{order:3;width:100%;overflow-x:auto;padding-bottom:4px;}
  .nav a{flex-shrink:0;}
  .layout-grid{grid-template-columns:1fr;}
  .page-title h1{font-size:24px;}
  .metric-value{font-size:22px;}
}

/* Section header inside panel */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border-soft);}
.sec-title{font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg);display:flex;align-items:center;gap:10px;}
.sec-title .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}

/* No scrollbar utility */
.no-scrollbar::-webkit-scrollbar{display:none;}
.no-scrollbar{scrollbar-width:none;}

/* density */
.density-sparse .metric-tile{padding:18px 20px;}
.density-sparse .metric-value{font-size:30px;}
.density-dense .metric-tile{padding:10px 12px;}
.density-dense .metric-value{font-size:22px;}
.density-dense .metric-label{margin-bottom:6px;}

/* Position card */
.pos{
  position:relative;padding:14px 16px;border:1px solid var(--border-soft);border-radius:12px;
  background:linear-gradient(180deg, rgba(0,0,0,.45), rgba(0,0,0,.25));
  cursor:pointer;transition:border-color .2s ease, transform .2s ease;
  overflow:hidden;
}
.pos:hover{border-color:var(--accent-border);}

/* History */
.hist{padding:11px 14px;border:1px solid var(--border-soft);border-radius:12px;background:rgba(0,0,0,.3);cursor:pointer;transition:border-color .2s ease;}
.hist:hover{border-color:var(--border);}
.hist.expanded{border-color:var(--accent-border);background:rgba(0,0,0,.45);box-shadow:0 0 18px color-mix(in oklch, var(--accent) 7%, transparent);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{width:100%;max-width:480px;background:linear-gradient(180deg, oklch(0.20 0.010 125), oklch(0.16 0.010 125));border:1px solid var(--accent-border);border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 1px color-mix(in oklch, var(--accent) 15%, transparent);}

/* ── HUD overlays toggle ─────────────────────────────────── */
.hud-overlays-off .reticle{display:none;}
.hud-overlays-off .panel::before{display:none;}
.hud-overlays-off .corner-tag{display:none;}
.hud-overlays-off .brackets::before,.hud-overlays-off .brackets::after{display:none;}

/* corner tags */
.corner-tag{position:absolute;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-4);letter-spacing:.18em;text-transform:uppercase;z-index:3;pointer-events:none;}
.corner-tag.tl{top:8px;left:14px;}
.corner-tag.tr{top:8px;right:14px;color:var(--accent);}
.corner-tag.br{bottom:8px;right:14px;}

/* equity line */
.eq-svg{width:100%;height:80px;display:block;}

/* Watchlist symbol */
.watch-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px dashed var(--border-soft);}
.watch-row:last-child{border-bottom:none;}

/* Scan log row */
.log-row{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--fg-2);padding:5px 0;display:grid;grid-template-columns:64px 60px 1fr auto;gap:10px;align-items:center;}
.log-row .t{color:var(--fg-4);}
.log-row .pass{color:var(--green-soft);}
.log-row .rej{color:var(--fg-4);}
.log-row .sym{color:var(--fg);font-weight:700;}

/* radar */
.radar-wrap{position:relative;width:100%;aspect-ratio:1/1;max-width:240px;margin:0 auto;}
.radar-sweep{animation:radarSweep 4s linear infinite;transform-origin:center;}

/* selection cosmetic */
::selection{background:color-mix(in oklch, var(--accent) 50%, transparent);color:#000;}
</style></head><body>
<div class="tactical-bg" id="tactical-bg"><div class="glow"></div><div class="grid"></div><div class="grain"></div><div class="scanline"></div></div>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
// gauntlet.jsx (inlined)
// ── Gauntlet Breakdown ──────────────────────────────────────
// Signal-funnel visualizer for Bot Status. Shows where each candidate
// signal died across the 21-stage filter chain.

const GAUNTLET_STAGES = [
  // group, id, label, hint
  { group:'PRE-SCORE',   id:'NO_DATA',           label:'NO DATA',            hint:'OHLCV missing for required TFs' },
  { group:'PRE-SCORE',   id:'MISSING_TF',        label:'MISSING TF',         hint:'Critical timeframe failed to load' },
  { group:'PRE-SCORE',   id:'STRUCTURAL_ANCHOR', label:'STRUCTURAL ANCHOR',  hint:'No valid HTF anchor (BOS/CHoCH/OB)' },
  { group:'PRE-SCORE',   id:'REGIME_ALIGNMENT',  label:'REGIME ALIGNMENT',   hint:'Direction conflicts with macro regime' },
  { group:'PRE-SCORE',   id:'BTC_IMPULSE',       label:'BTC IMPULSE',        hint:'BTC moving against the trade' },

// Auto-detect the dominant kill stage and produce an actionable insight
function deriveBottleneck(counts){
  // Skip terminal & ok-for-now stages
  const skip = new Set(['EXECUTED','PENDING_FILL']);
  const total = Object.entries(counts).reduce((s,[k,v])=> skip.has(k) ? s : s+v, 0);
  if (total === 0) return null;
  let topId = null, topCount = 0;
  for (const [id,c] of Object.entries(counts)){
    if (skip.has(id)) continue;
    if (c > topCount) { topCount = c; topId = id; }
  }
  if (!topId || topCount === 0) return null;
  const pct = Math.round((topCount/total)*100);

  const ACTION_MAP = {
    CONFLUENCE:        { msg:'Confluence threshold may be too high for current conditions.', cta:'Switch to STRIKE (≥6.8)', href:'Bot.html#setup' },
    REGIME_ALIGNMENT:  { msg:'Most signals fight the macro regime — your direction bias is wrong.', cta:'Review regime detector', href:'Intel.html' },
    REGIME_VETO:       { msg:'Late-stage regime check is killing approved plans.', cta:'Inspect regime detector', href:'Intel.html' },
    BTC_IMPULSE:       { msg:'BTC volatility is breaking signals before entry.', cta:'Open BTC chart', href:'Intel.html#btc' },
    RISK_VALIDATION:   { msg:'Plans don\u2019t meet R:R floor — stops or TPs need recalibrating.', cta:'Tune risk params', href:'Settings.html' },
    ML_GATE:           { msg:'Edge model is rejecting most signals — model may be stale.', cta:'Retrain model', href:'Training.html' },
    MAX_POSITIONS:     { msg:'Concurrent-position cap is the bottleneck, not detection.', cta:'Raise cap in Risk Center', href:'Settings.html' },
    COOLDOWN:          { msg:'Cooldown filter eating most signals — recent loss streak.', cta:'Review Journal', href:'Journal.html' },
    NO_TRADE_PLAN:     { msg:'Planner can\u2019t build valid plans — anchors may be too sparse.', cta:'Tune planner', href:'Bot.html#triggers' },
    STRUCTURAL_ANCHOR: { msg:'No HTF anchors are forming — market is choppy.', cta:'Wait for trend', href:'Intel.html' },
    EXEC_ERROR:        { msg:'Exchange is rejecting orders — check API keys / size precision.', cta:'Open Risk Center', href:'Settings.html' },
  };
  const action = ACTION_MAP[topId] || { msg:'Investigate this stage in detail mode.', cta:'View detail', href:'#' };
  const stage = GAUNTLET_STAGES.find(s=>s.id===topId);
  return { id:topId, label: stage?.label || topId, count: topCount, pct, ...action };
}

function GauntletBreakdown({ signals }){
  const sigs = signals || MOCK_SIGNALS;
  const [detail, setDetail] = useState(false);
  const [filterStage, setFilterStage] = useState(null);

  const counts = useMemo(()=>{
    const c = {};
    GAUNTLET_STAGES.forEach(s=>{ c[s.id] = 0; });
    sigs.forEach(s => { c[s.stage] = (c[s.stage]||0) + 1; });
    return c;
  }, [sigs]);

  const total = sigs.length;
  const executed = counts['EXECUTED'] || 0;
  const conversion = total > 0 ? (executed/total)*100 : 0;
  const bottleneck = useMemo(()=>deriveBottleneck(counts), [counts]);

  // Max count for bar scaling (excluding zero stages for nicer look)
  const maxCount = Math.max(...Object.values(counts), 1);

  // Group stages
  const groups = ['PRE-SCORE','POST-SCORE','EXECUTION'];

  const stageColor = (id, count) => {
    if (count === 0) return 'var(--fg-4)';
    if (id === 'EXECUTED') return 'var(--green-soft)';
    if (id === 'PENDING_FILL') return 'var(--amber-2)';
    return 'var(--red-2)';
  };
  const stageBg = (id, count) => {
    if (count === 0) return 'transparent';
    if (id === 'EXECUTED') return 'rgba(74,222,128,.12)';
    if (id === 'PENDING_FILL') return 'rgba(251,191,36,.10)';
    return 'rgba(248,113,113,.10)';
  };

  const filteredSigs = filterStage ? sigs.filter(s=>s.stage===filterStage) : sigs;

  return (
    <section className="panel">
      <div className="sec-head">
        <div className="sec-title"><span className="dot"/> Gauntlet Breakdown</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span className="chip">{total} CANDIDATES · {executed} EXECUTED · {conversion.toFixed(1)}%</span>
          <button className="btn" onClick={()=>setDetail(!detail)} style={{padding:'4px 10px',fontSize:9,letterSpacing:'.18em'}}>{detail?'◉ DETAIL':'◯ DETAIL'}</button>
        </div>
      </div>

      {/* Bottleneck insight pill */}
      {bottleneck && (
        <div style={{margin:'14px 18px 0',padding:'10px 14px',border:'1px solid var(--amber-border)',borderRadius:8,background:'var(--amber-bg)',display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{color:'var(--amber-2)',fontSize:14}}>⚠</span>
            <span className="mono" style={{fontSize:9,color:'var(--amber-2)',letterSpacing:'.18em',fontWeight:700}}>BOTTLENECK</span>
            <span className="mono" style={{fontSize:11,color:'var(--fg)',fontWeight:700,letterSpacing:'.14em'}}>{bottleneck.label}</span>
            <span className="mono" style={{fontSize:10,color:'var(--fg-3)'}}>· {bottleneck.count} signals · {bottleneck.pct}% of rejects</span>
          </div>
          <div style={{flex:1,minWidth:200,fontSize:11,color:'var(--fg-2)',lineHeight:1.4}}>{bottleneck.msg}</div>
          <a href={bottleneck.href} className="btn" style={{padding:'5px 12px',fontSize:10,letterSpacing:'.16em',textDecoration:'none',background:'var(--amber-bg)',borderColor:'var(--amber-border)',color:'var(--amber-2)'}}>{bottleneck.cta} →</a>
        </div>
      )}

      {/* Funnel */}
      <div style={{padding:'14px 18px',display:'grid',gridTemplateColumns:detail?'1fr':'1fr 1fr 1fr',gap:18}}>
        {groups.map(g=>(
          <div key={g}>
            <div className="mono" style={{fontSize:9,color:'var(--fg-4)',letterSpacing:'.20em',marginBottom:8,paddingBottom:6,borderBottom:'1px dashed var(--border-soft)'}}>// {g} {g==='PRE-SCORE'?'· cheap rejects':g==='POST-SCORE'?'· after confluence math':'· execution layer'}</div>
            <div style={{display:'flex',flexDirection:'column',gap:detail?2:3}}>
              {GAUNTLET_STAGES.filter(s=>s.group===g).map(s=>{
                const c = counts[s.id] || 0;
                const w = (c/maxCount)*100;
                const sel = filterStage === s.id;
                return (
                  <div key={s.id}
                       onClick={()=>setFilterStage(sel?null:s.id)}
                       title={s.hint}
                       style={{display:'grid',gridTemplateColumns:detail?'160px 1fr 50px':'130px 1fr 32px',gap:8,alignItems:'center',padding:'5px 8px',borderRadius:4,cursor:'pointer',background:sel?'rgba(255,255,255,.04)':'transparent',border:sel?'1px solid var(--accent-border)':'1px solid transparent',transition:'all .15s'}}>
                    <span className="mono" style={{fontSize:9,color: c===0?'var(--fg-4)':'var(--fg-2)',letterSpacing:'.10em',fontWeight:c>0?700:400,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.label}</span>
                    <div style={{height:detail?16:12,background:'rgba(0,0,0,.35)',borderRadius:2,position:'relative',overflow:'hidden',border:'1px solid var(--border-soft)'}}>
                      <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${w}%`,background:stageBg(s.id,c),borderRight:c>0?`2px solid ${stageColor(s.id,c)}`:'none',transition:'width .3s'}}/>
                    </div>
                    <span className="mono" style={{fontSize:10,fontWeight:700,color:stageColor(s.id,c),textAlign:'right',letterSpacing:'.06em'}}>{c}</span>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {/* Detail rows — visible when DETAIL toggle on, OR when filtering by stage */}
      {(detail || filterStage) && (
        <div style={{padding:'0 18px 18px'}}>
          <div style={{paddingTop:10,borderTop:'1px dashed var(--border-soft)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <span className="mono" style={{fontSize:9,color:'var(--fg-4)',letterSpacing:'.20em'}}>// {filterStage ? `STAGE: ${filterStage}` : 'ALL SIGNALS'} · {filteredSigs.length} ROWS</span>
              {filterStage && <button className="btn" onClick={()=>setFilterStage(null)} style={{padding:'3px 10px',fontSize:9,letterSpacing:'.16em'}}>× CLEAR FILTER</button>}
            </div>
            <table className="mono" style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr style={{textAlign:'left',color:'var(--fg-4)',fontSize:9,letterSpacing:'.18em',textTransform:'uppercase'}}>
                  <th style={{padding:'4px 0'}}>Time</th>
                  <th>Symbol</th>
                  <th>TF</th>
                  <th>Side</th>
                  <th>Score</th>
                  <th>Stage</th>
                  <th>Detail</th>
                </tr>
              </thead>
              <tbody>
                {filteredSigs.slice().reverse().map((s,i)=>{
                  const c = stageColor(s.stage, 1);
                  return (
                    <tr key={i} style={{borderTop:'1px dashed var(--border-soft)'}}>
                      <td style={{padding:'6px 0',color:'var(--fg-4)',fontSize:10}}>{s.ts}</td>
                      <td style={{fontWeight:700}}>{s.sym}</td>
                      <td style={{color:'var(--fg-3)'}}>{s.tf}</td>
                      <td style={{color:s.dir==='LONG'?'var(--green-soft)':'var(--red-2)',fontWeight:700,fontSize:10,letterSpacing:'.12em'}}>{s.dir}</td>
                      <td style={{color: s.score==null ? 'var(--fg-4)' : s.score>=s.threshold?'var(--green-soft)':'var(--red-2)'}}>
                        {s.score==null ? '—' : `${s.score.toFixed(1)} / ${s.threshold.toFixed(1)}`}
                      </td>
                      <td><span style={{color:c,fontWeight:700,fontSize:9,letterSpacing:'.14em',padding:'2px 8px',border:`1px solid ${c}`,borderRadius:3,background:stageBg(s.stage,1)}}>{s.stage}</span></td>
                      <td style={{color:'var(--fg-3)',fontSize:10}}>{s.extra || '—'}</td>
                    </tr>
                  );
                })}
                {filteredSigs.length === 0 && (
                  <tr><td colSpan={7} style={{textAlign:'center',padding:'20px 0',color:'var(--fg-4)',fontSize:11,letterSpacing:'.16em'}}>// no signals at this stage</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </section>
  );
}

window.GauntletBreakdown = GauntletBreakdown;

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>
<script type="text/babel">// ── SniperSight shared chrome ─────────────────────────────────
// Loaded into every page; exposes globals on window.SS_*

const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Tactical Background controller ──────────────────────────
function applyTweaks(t, pageAccent){

// ── Formatters ──────────────────────────────────────────────
function fmtMoney(v, d){ d = d == null ? 2 : d; return (v<0?'-$':'$') + Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtPct(v, d){ d = d == null ? 2 : d; return (v>=0?'+':'') + v.toFixed(d) + '%'; }
function fmtPrice(p){ if(p<1) return '$'+p.toFixed(5); if(p<100) return '$'+p.toFixed(4); return '$'+p.toFixed(2); }
function fmtDur(seconds){
  if (seconds<60) return seconds+'s';
  if (seconds<3600) return Math.floor(seconds/60)+'m '+(seconds%60)+'s';
  const h=Math.floor(seconds/3600), m=Math.floor((seconds%3600)/60);
  return h+'h '+m+'m';
}
function fmtNum(v){
  if (Math.abs(v) >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(2)+'M';
  if (Math.abs(v) >= 1e3) return (v/1e3).toFixed(2)+'K';
  return v.toFixed(2);
}

// ── Tactical Background controller (toggled by tweaks) ──────
function applyTweaks(t){
  const root = document.documentElement;
  // accent color
  const accents = {
    green: { c:'#00ffaa', bg:'rgba(0,255,170,.10)', bd:'rgba(0,255,170,.30)' },
    amber: { c:'#fbbf24', bg:'rgba(251,191,36,.10)', bd:'rgba(251,191,36,.35)' },
    blue:  { c:'#60a5fa', bg:'rgba(96,165,250,.10)', bd:'rgba(96,165,250,.30)' },
  };
  const a = accents[t.theme] || accents.green;
  root.style.setProperty('--accent', a.c);
  root.style.setProperty('--accent-bg', a.bg);
  root.style.setProperty('--accent-border', a.bd);

  // background intensity
  const bg = document.getElementById('tactical-bg');
  if (bg) bg.classList.toggle('off', !t.tacticalBg);

  // hud overlays
  document.body.classList.toggle('hud-overlays-off', !t.hudOverlays);

  // density
  document.body.classList.remove('density-sparse','density-balanced','density-dense');
  document.body.classList.add('density-' + (t.density || 'balanced'));
}

    [...trades].reverse().forEach((t,i)=>{ eq += t.pnl; arr.push({x:i+1, y:eq}); });
    return arr;
  }, [trades, initial]);
  if (pts.length<2) return <div style={{height:80, display:'flex',alignItems:'center',justifyContent:'center',color:'var(--fg-4)',fontFamily:'JetBrains Mono,monospace',fontSize:10,letterSpacing:'.18em',textTransform:'uppercase'}}>Awaiting trades…</div>;
  const minY = Math.min(...pts.map(p=>p.y)), maxY=Math.max(...pts.map(p=>p.y));
  const rangeY = maxY-minY || 1;
  const W=600, H=80, pad=4;
  const path = pts.map((p,i)=>{
    const x = pad + (p.x/(pts.length-1))*(W-2*pad);
    const y = H - pad - ((p.y-minY)/rangeY)*(H-2*pad);
    return (i?'L':'M')+' '+x.toFixed(1)+' '+y.toFixed(1);
  }).join(' ');
  const last = pts[pts.length-1];
  const isUp = last.y >= initial;
  const stroke = isUp ? 'var(--green)' : 'var(--red-2)';
  const lastX = pad + 1*(W-2*pad);
  const lastY = H - pad - ((last.y-minY)/rangeY)*(H-2*pad);
  const area = path + ` L ${lastX.toFixed(1)} ${H} L ${pad} ${H} Z`;
  return (
    <svg className="eq-svg" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="eqg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stopColor={stroke} stopOpacity=".25"/>
          <stop offset="100%" stopColor={stroke} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#eqg)"/>
      <path d={path} stroke={stroke} strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={lastX} cy={lastY} r="3" fill={stroke}/>
    </svg>
  );
}

// ── Position Card ───────────────────────────────────────────
function PositionCard({ pos, onOpen }){
  const isLong = pos.direction==='LONG';
  const profit = pos.unrealized_pnl >= 0;

  // flash on price tick
  const prev = useRef(pos.current_price);
  const [flash, setFlash] = useState('');
  useEffect(()=>{
    if (pos.current_price > prev.current) { setFlash('flash-green'); }
    else if (pos.current_price < prev.current) { setFlash('flash-red'); }
    prev.current = pos.current_price;
    const t=setTimeout(()=>setFlash(''),900);
    return ()=>clearTimeout(t);
  }, [pos.current_price]);

  const initialRisk = Math.abs(pos.entry_price - pos.initial_stop_loss);
  const moved = isLong ? (pos.current_price - pos.entry_price) : (pos.entry_price - pos.current_price);
  const rMult = initialRisk>0 ? moved/initialRisk : 0;

  // progress between SL and TP1
  let progress = 50;
  const { stop_loss:sl, entry_price:e, tp1, current_price:c } = pos;
  if (isLong){
    if (c>=e && tp1!=null){ const r=tp1-e; progress = r>0 ? 50+((c-e)/r)*50 : 50; }
    else if (c<e){ const r=e-sl; progress = r>0 ? ((c-sl)/r)*50 : 50; }
  } else {
    if (c<=e && tp1!=null){ const r=e-tp1; progress = r>0 ? 50+((e-c)/r)*50 : 50; }
    else if (c>e){ const r=sl-e; progress = r>0 ? ((sl-c)/r)*50 : 50; }
  }
  progress = Math.max(2, Math.min(98, progress));

  const timeOpen = fmtDur(Math.floor((Date.now()-pos.opened_at)/1000));

  return (
    <div className={`pos brackets ${flash}`} onClick={()=>onOpen(pos)}>
      <div className="corner-tag tl">// {pos.id.toUpperCase()}</div>
      <div className="corner-tag tr">{pos.confluence.toFixed(1)} CONF</div>

      {/* Top row */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,marginBottom:14,marginTop:6,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span className={`chip ${isLong?'chip-green':'chip-red'}`}>{isLong?'▲':'▼'} {pos.direction}</span>
          <span style={{fontFamily:'Share Tech Mono,monospace',fontSize:18,letterSpacing:'.06em',color:'var(--fg)'}}>{pos.symbol}</span>
          <span className={`chip ${pos.trade_type==='scalp'?'chip-amber':pos.trade_type==='swing'?'chip-purple':'chip-blue'}`} style={{fontSize:9}}>{pos.trade_type}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span className={`chip ${rMult>=0?'chip-green':'chip-red'}`}>{rMult>=0?'+':''}{rMult.toFixed(2)}R</span>
          <span className="mono" style={{fontWeight:800,fontSize:15,color:profit?'var(--green-soft)':'var(--red-2)'}}>{fmtPct(pos.unrealized_pnl_pct)}</span>
        </div>
      </div>

      {/* Metric row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:'10px 14px',marginBottom:14}}>
        <Mini label="Size"   value={fmtMoney(pos.quantity*pos.entry_price)} accent />
        <Mini label="Entry"  value={fmtPrice(pos.entry_price)} />
        <Mini label="Now"    value={fmtPrice(pos.current_price)} bold />
        <Mini label="P&L"    value={(profit?'+':'')+fmtMoney(pos.unrealized_pnl)} valueColor={profit?'var(--green-soft)':'var(--red-2)'} />
        <Mini label="Target" value={fmtMoney(pos.target_pnl)} valueColor="var(--green-soft)" />
        <Mini label="Risk"   value={fmtMoney(pos.risk_pnl)} valueColor="var(--red-2)" />
        <Mini label="Open"   value={timeOpen} valueColor="var(--amber)" />
        <Mini label="Lev"    value={pos.leverage+'×'} bold />
      </div>

      {/* Hud progress */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',marginBottom:6}}>
        <span className="mono" style={{fontSize:9,color:'var(--red-2)',textTransform:'uppercase',letterSpacing:'.16em',opacity:.85}}>SL · {fmtMoney(pos.risk_pnl)}</span>
        <span className="mono" style={{fontSize:9,textAlign:'center',color:'var(--fg-4)',textTransform:'uppercase',letterSpacing:'.16em'}}>ENTRY</span>
        <span className="mono" style={{fontSize:9,textAlign:'right',color:'var(--green-soft)',textTransform:'uppercase',letterSpacing:'.16em',opacity:.85}}>TP · {fmtMoney(pos.target_pnl)}</span>
      </div>
      <div className="hud-prog">
        <div className="tick" style={{left:'25%'}}/>
        <div className="tick" style={{left:'50%'}}/>
        <div className="tick" style={{left:'75%'}}/>
        <div className="marker" style={{left: progress + '%'}}/>
      </div>

      {/* Targets ladder */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:14,gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0}}>
          <span className="mono" style={{fontSize:9,color:'var(--fg-4)',textTransform:'uppercase',letterSpacing:'.18em'}}>TARGETS {pos.targets_hit}/{pos.targets_hit+pos.targets_remaining}</span>
          <div style={{display:'flex',gap:4}}>
            {Array.from({length: pos.targets_hit + pos.targets_remaining}).map((_,i)=>(
              <div key={i} style={{
                width:18,height:5,borderRadius:2,
                background: i<pos.targets_hit ? (isLong?'var(--green)':'var(--red-2)') : 'rgba(255,255,255,.06)',

// ── Position Chart Modal ────────────────────────────────────
function PositionChartModal({ pos, onClose }){
  if (!pos) return null;
  const isLong = pos.direction === 'LONG';
  const levels = [
    { label:'TP3',     price: pos.tp_final, color:'#86efac' },
    { label:'TP2',     price: pos.tp2,      color:'#4ade80' },
    { label:'TP1',     price: pos.tp1,      color:'#22c55e' },
    { label:'CURRENT', price: pos.current_price, color:'#fbbf24' },
    { label:'ENTRY',   price: pos.entry_price,   color:'#60a5fa' },
    { label:'STOP',    price: pos.stop_loss, color:'#f87171' },
  ].sort((a,b)=>b.price-a.price);
  const prices = levels.map(l=>l.price);
  const minP = Math.min(...prices), maxP = Math.max(...prices);
  const range = maxP-minP || maxP*.01;

  // synthetic candles biased by direction
  const candles = useMemo(()=>{
    const N = 36;
    const arr = [];
    let p = pos.entry_price * (isLong ? 0.985 : 1.015);
    for (let i=0;i<N;i++){
      const drift = isLong ? 0.0015 : -0.0015;
      const vol = (Math.sin(i*1.7)+Math.cos(i*0.9))*0.004 + (Math.random()-.5)*0.005;
      const open = p;
      const close = p * (1 + drift + vol);
      const high = Math.max(open,close) * (1 + Math.abs(Math.random()*0.003));
      const low  = Math.min(open,close) * (1 - Math.abs(Math.random()*0.003));
      arr.push({open,close,high,low});
      p = close;
    }
    // anchor end at current
    const factor = pos.current_price / arr[arr.length-1].close;
    arr.forEach(c=>{ c.open*=factor; c.close*=factor; c.high*=factor; c.low*=factor; });
    return arr;
  }, [pos]);

  const allP = [...prices, ...candles.flatMap(c=>[c.high,c.low])];
  const yMin = Math.min(...allP)*.998;
  const yMax = Math.max(...allP)*1.002;
  const yRng = yMax - yMin;
  const W = 540, H = 280, leftPad=10, rightPad=70, topPad=14, botPad=14;
  const innerW = W-leftPad-rightPad;
  const innerH = H-topPad-botPad;
  const cw = innerW / candles.length;

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{maxWidth:620}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border-soft)',background:'rgba(0,0,0,.35)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span className={`chip ${isLong?'chip-green':'chip-red'}`}>{isLong?'▲':'▼'} {pos.direction}</span>
            <span style={{fontFamily:'Share Tech Mono,monospace',fontSize:18,letterSpacing:'.08em'}}>{pos.symbol}</span>
            <span className="chip">{pos.trade_type}</span>
          </div>
          <button className="btn" style={{padding:'6px 10px'}} onClick={onClose}>✕ CLOSE</button>
        </div>
        <div style={{padding:'14px 18px'}}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',background:'rgba(0,0,0,.35)',border:'1px solid var(--border-soft)',borderRadius:8}}>
            {/* grid */}
            {[0,.25,.5,.75,1].map(g=>(
              <line key={g} x1={leftPad} x2={W-rightPad} y1={topPad+g*innerH} y2={topPad+g*innerH} stroke="rgba(255,255,255,.05)" strokeDasharray="2 3"/>
            ))}
            {/* candles */}
            {candles.map((c,i)=>{
              const x = leftPad + i*cw + cw*0.15;
              const cx = leftPad + i*cw + cw/2;
              const yO = topPad + ((yMax-c.open)/yRng)*innerH;
              const yC = topPad + ((yMax-c.close)/yRng)*innerH;
              const yH = topPad + ((yMax-c.high)/yRng)*innerH;
              const yL = topPad + ((yMax-c.low)/yRng)*innerH;
              const up = c.close>=c.open;
              const fill = up ? '#22c55e' : '#f87171';
              const w = cw*0.7;
              return (
                <g key={i} opacity={i<candles.length-1?.85:1}>
                  <line x1={cx} x2={cx} y1={yH} y2={yL} stroke={fill} strokeWidth=".8" opacity=".7"/>
                  <rect x={x} width={w} y={Math.min(yO,yC)} height={Math.max(1.2,Math.abs(yC-yO))} fill={fill} opacity={up?.85:.85} stroke={fill} strokeOpacity=".4"/>
                </g>
              );
            })}
            {/* level lines */}
            {levels.map((l,i)=>{
              const y = topPad + ((yMax-l.price)/yRng)*innerH;
              if (y<topPad-2 || y>H-botPad+2) return null;
              return (
                <g key={i}>
                  <line x1={leftPad} x2={W-rightPad} y1={y} y2={y} stroke={l.color} strokeWidth=".7" strokeDasharray="3 3" opacity=".7"/>
                  <rect x={W-rightPad+2} y={y-9} width={66} height={18} fill={l.color} opacity=".15" stroke={l.color} strokeOpacity=".55"/>
                  <text x={W-rightPad+6} y={y+4} fill={l.color} fontFamily="JetBrains Mono,monospace" fontSize="9" fontWeight="700" letterSpacing=".15em">{l.label}</text>
                  <text x={W-2} y={y+4} fill={l.color} fontFamily="JetBrains Mono,monospace" fontSize="9" fontWeight="700" textAnchor="end">{l.price<1?l.price.toFixed(5):l.price<100?l.price.toFixed(3):l.price.toFixed(2)}</text>
                </g>
              );
            })}
            {/* current price marker */}
            {(() => {
              const y = topPad + ((yMax-pos.current_price)/yRng)*innerH;
              return <circle cx={W-rightPad-4} cy={y} r="4" fill="#fbbf24" style={{filter:'drop-shadow(0 0 6px #fbbf24)'}}/>;
            })()}
          </svg>

          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginTop:14}}>
            {levels.map((l,i)=>(
              <div key={i} style={{padding:'8px 10px',border:'1px solid var(--border-soft)',borderRadius:8,background:'rgba(0,0,0,.3)'}}>
                <div className="mono" style={{fontSize:9,color:l.color,letterSpacing:'.18em',textTransform:'uppercase',marginBottom:4,fontWeight:700}}>{l.label}</div>
                <div className="mono" style={{fontSize:13,fontWeight:800,color:l.color}}>{l.price<1?'$'+l.price.toFixed(5):l.price<100?'$'+l.price.toFixed(3):'$'+l.price.toFixed(2)}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

}
function Row({ k, v, accent, green, red, amber }){

    { t:'14:40:23', sym:'AAVE/USDT', passed:false, reason:'no fresh OB in last 50 candles', conf:3.9 },
    { t:'14:40:00', sym:'LINK/USDT', passed:false, reason:'volume gate failed',             conf:3.2 },
    { t:'14:39:37', sym:'OP/USDT',   passed:false, reason:'BTC impulse veto',               conf:0   },
  ]);

  // tick clock + uptime
  useEffect(()=>{
    const id = setInterval(()=>{ setNow(Date.now()); setUptime(u=>u+1); setNextScan(s=> s>0?s-1:Math.floor(Math.random()*45+30)); }, 1000 / (t.simSpeed || 1));
    return ()=>clearInterval(id);
  }, [t.simSpeed]);

  // simulated price ticks
  useEffect(()=>{
    const id = setInterval(()=>{
      setPositions(prev => prev.map(p=>{
        const drift = (Math.random()-0.48) * p.entry_price * 0.0008;
        const price = p.current_price + drift;
        const isLong = p.direction === 'LONG';
        const pnl = (isLong ? price - p.entry_price : p.entry_price - price) * p.quantity;
        const pnlPct = (pnl / (p.entry_price * p.quantity)) * 100 * p.leverage;
        return {...p, current_price: price, unrealized_pnl: pnl, unrealized_pnl_pct: pnlPct };
      }));
    }, 1500 / (t.simSpeed || 1));
    return ()=>clearInterval(id);
  }, [t.simSpeed]);

  // simulated scan progress
  useEffect(()=>{
    if (!running) return;
    const id = setInterval(()=>{
      setScanProgress(sp=>{
        if (sp.done >= sp.total) {
          // restart cycle
          return { done: 1, total: 25, passed: Math.random()<.5?1:0, rejected: Math.random()<.5?0:1, current: SCAN_SYMBOLS[0]+'/USDT', recent: [{sym: SCAN_SYMBOLS[0], passed: Math.random()<.4}] };
        }
        const passed = Math.random()<.2;
        const sym = SCAN_SYMBOLS[(sp.done) % SCAN_SYMBOLS.length];
        return {
          done: sp.done+1,
          total: sp.total,
          passed: sp.passed + (passed?1:0),
          rejected: sp.rejected + (passed?0:1),
          current: SCAN_SYMBOLS[(sp.done+1) % SCAN_SYMBOLS.length] + '/USDT',
          recent: [{ sym, passed }, ...sp.recent].slice(0,12),
        };
      });
      setLogs(prev=>{
        const sym = SCAN_SYMBOLS[Math.floor(Math.random()*SCAN_SYMBOLS.length)];
        const passed = Math.random()<.2;
        const conf = passed ? +(7+Math.random()*1.5).toFixed(1) : +(2+Math.random()*4).toFixed(1);
        const reasons = passed
          ? ['OB+FVG aligned · BOS confirmed','4H OB · sweep + displacement','liquidity sweep · CHoCH 15m','HTF + LTF aligned · trail tight']
          : ['HTF misaligned · regime CHOP','displacement < 1.5 ATR','no fresh OB','volume gate failed','BTC impulse veto','spread > limit'];
        const time = new Date(Date.now());
        const t = `${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}:${String(time.getSeconds()).padStart(2,'0')}`;
        return [{ t, sym: sym+'/USDT', passed, reason: reasons[Math.floor(Math.random()*reasons.length)], conf }, ...prev].slice(0,12);
      });
    }, 2200 / (t.simSpeed || 1));
    return ()=>clearInterval(id);
  }, [running, t.simSpeed]);

  const handleStop = () => {
    setStopping(true);

            {label:'Test', value:'testnet'},
          ]}/>
        </window.TweakSection>
        <window.TweakSection title="HUD">
          <window.TweakToggle label="Tactical Background" value={t.tacticalBg} onChange={v=>setTweak('tacticalBg',v)} hint="Scanlines, grid, drift glow"/>
          <window.TweakToggle label="HUD Overlays" value={t.hudOverlays} onChange={v=>setTweak('hudOverlays',v)} hint="Reticles, scanline texture, brackets"/>
        </window.TweakSection>
        <window.TweakSection title="Sim">
          <window.TweakSlider label="Speed" value={t.simSpeed} min={0.5} max={4} step={0.5} onChange={v=>setTweak('simSpeed',v)}/>
          <window.TweakButton label={running?'Stop Engine':'Start Engine'} onClick={()=>running?handleStop():handleStart()}/>
          <window.TweakButton label="Reset Session" onClick={()=>{ setPositions(SEED_POSITIONS); setTrades(SEED_HISTORY); setRunning(true); }}/>
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
}

function RiskBar({ label, value, max, unit, amber }){
  const pct = Math.min(100, (value/max)*100);
  const color = amber ? 'var(--amber)' : 'var(--green-soft)';
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
        <span className="mono" style={{fontSize:10,color:'var(--fg-4)',letterSpacing:'.18em',textTransform:'uppercase'}}>{label}</span>
        <span className="mono" style={{fontSize:11,color,fontWeight:700}}>{value}{unit} <span style={{color:'var(--fg-4)'}}>/ {max}{unit}</span></span>
      </div>
      <div style={{position:'relative',height:6,borderRadius:3,background:'rgba(0,0,0,.5)',overflow:'hidden',border:'1px solid var(--border-soft)'}}>
        <div style={{height:'100%',width:pct+'%',background:`linear-gradient(90deg, ${color}, color-mix(in oklch, ${color} 60%, transparent))`,boxShadow:`0 0 10px ${color}`,transition:'width .6s ease'}}/>
      </div>
    </div>
  );
}

window.StatusApp = StatusApp;
if (!window.__BOT_SHELL__) ReactDOM.createRoot(document.getElementById('root')).render(<StatusApp/>);
</script>
<script type="text/babel">// ── BOT — unified tabbed shell ──────────────────────────────
const BotSS = window.SS;
function BotShell(){
  const [tab, setTab] = useState(()=>{
    const h = (location.hash || '').replace('#','').toLowerCase();
    return (h==='status'||h==='setup') ? h : 'setup';
  });
  useEffect(()=>{ location.hash = tab; },[tab]);
  const [now, setNow] = useState(Date.now());
  useEffect(()=>{ const id=setInterval(()=>setNow(Date.now()),1000); return ()=>clearInterval(id); },[]);
  return (
    <div className="page">
      <BotSS.Topbar active="bot" now={now}/>
      <div className="bot-tab-banner">
        <div className="tab-switch">
          <button className={tab==='setup'?'active':''} onClick={()=>setTab('setup')}>◇ SETUP · pre-deploy</button>
          <button className={tab==='status'?'active':''} onClick={()=>setTab('status')}>● STATUS · live exchange</button>
        </div>
        <span className="mono" style={{fontSize:10,color:'var(--fg-3)',letterSpacing:'.18em'}}>
          {tab==='setup'?'// CONFIGURE → DEPLOY':'// LIVE · REAL FUNDS · IRREVERSIBLE'}
        </span>
      </div>
      <div style={{display: tab==='setup'?'block':'none'}}><window.SetupApp/></div>
      <div style={{display: tab==='status'?'block':'none'}}><window.StatusApp/></div>
    </div>
  );
}
function bootBot(){
  if (window.SetupApp && window.StatusApp) {
    ReactDOM.createRoot(document.getElementById('root')).render(<BotShell/>);
  } else { setTimeout(bootBot, 30); }
}
bootBot();
</script></body></html>
