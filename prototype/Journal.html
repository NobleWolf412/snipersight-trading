<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>SniperSight — Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
.bot-tab-banner{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:10px 14px;border:1px solid var(--border-soft);border-radius:8px;background:rgba(0,0,0,.4);margin-bottom:14px;flex-wrap:wrap}
.tab-switch{display:flex;gap:0;border:1px solid var(--border-soft);border-radius:8px;overflow:hidden}
.tab-switch button{background:rgba(0,0,0,.4);border:none;color:var(--fg-3);padding:8px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.18em;cursor:pointer;transition:all .15s;border-right:1px solid var(--border-soft)}
.tab-switch button:last-child{border-right:none}
.tab-switch button.active{background:var(--accent-bg);color:var(--accent);box-shadow:inset 0 -2px 0 var(--accent)}
.tab-switch button:hover:not(.active){background:rgba(255,255,255,.04);color:var(--fg)}

:root {
  --bg: oklch(0.18 0.008 120);
  --bg-2: oklch(0.22 0.010 125);
  --card: oklch(0.26 0.012 125);
  --card-2: oklch(0.30 0.012 125);
  --border: oklch(0.36 0.015 130);
  --border-soft: oklch(0.32 0.015 130 / 0.6);
  --fg: oklch(0.94 0.012 150);
  --fg-2: oklch(0.78 0.012 150);
  --fg-3: oklch(0.58 0.015 150);
  --fg-4: oklch(0.42 0.012 150);
  --green: #00ffaa;
  --green-soft: #4ade80;
  --green-bg: rgba(0,255,170,.10);
  --green-border: rgba(0,255,170,.30);
  --amber: #ffc266;
  --amber-2: #fbbf24;
  --amber-bg: rgba(251,191,36,.10);
  --amber-border: rgba(251,191,36,.35);
  --red: #ff6464;
  --red-2: #f87171;
  --red-bg: rgba(248,113,113,.10);
  --red-border: rgba(248,113,113,.35);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,.10);
  --blue-border: rgba(96,165,250,.30);
  --cyan: #22d3ee;
  --purple: #c084fc;
  /* accent applied dynamically via tweaks (green/amber/blue) */
  --accent: var(--green);
  --accent-bg: var(--green-bg);
  --accent-border: var(--green-border);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:'Inter',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;}
body{min-height:100vh;overflow-x:hidden;position:relative;}

/* ── Tactical background layers ─────────────────────────── */
.tactical-bg{position:fixed;inset:0;z-index:-10;pointer-events:none;overflow:hidden;}
.tactical-bg.off{display:none;}
.tactical-bg::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, oklch(0.14 0.010 120) 0%, oklch(0.10 0.008 120) 50%, oklch(0.13 0.010 120) 100%);
}
.tactical-bg .glow{
  position:absolute;inset:-20%;
  background:
    radial-gradient(ellipse 60% 40% at 20% 30%, color-mix(in oklch, var(--accent) 8%, transparent) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 75%, rgba(96,165,250,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, color-mix(in oklch, var(--accent) 4%, transparent) 0%, transparent 50%);
  animation:glowDrift 30s ease-in-out infinite;
}
@keyframes glowDrift{
  0%,100%{transform:translate(0,0) scale(1);opacity:.7;}
  50%{transform:translate(2%,-2%) scale(1.05);opacity:1;}
}
.tactical-bg .grid{
  position:absolute;inset:0;
  background-image:radial-gradient(circle at center, color-mix(in oklch, var(--accent) 22%, transparent) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:.06;
  animation:gridDrift 120s linear infinite;
}
@keyframes gridDrift{from{background-position:0 0}to{background-position:40px 0}}
.tactical-bg .scanline{
  position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg, transparent, color-mix(in oklch, var(--accent) 40%, transparent) 30%, color-mix(in oklch, var(--accent) 60%, transparent) 50%, color-mix(in oklch, var(--accent) 40%, transparent) 70%, transparent);
  box-shadow:0 0 18px color-mix(in oklch, var(--accent) 50%, transparent);
  animation:scanSweep 8s linear infinite;
}
@keyframes scanSweep{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
.tactical-bg .grain{
  position:absolute;inset:0;opacity:.04;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  animation:grainFlick .5s steps(2) infinite;
}
@keyframes grainFlick{0%,100%{opacity:.03}50%{opacity:.05}}

/* ── HUD type ───────────────────────────────────────────── */
.hud{font-family:'Share Tech Mono',ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;}
.term{font-family:'VT323',ui-monospace,monospace;letter-spacing:.04em;}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
.hud-glow{color:var(--accent);text-shadow:0 0 6px color-mix(in oklch, var(--accent) 60%, transparent), 0 0 14px color-mix(in oklch, var(--accent) 35%, transparent);}
.hud-glow-amber{color:var(--amber);text-shadow:0 0 6px rgba(255,194,102,.7),0 0 14px rgba(255,194,102,.35);}
.hud-glow-red{color:var(--red);text-shadow:0 0 6px rgba(255,100,100,.7),0 0 14px rgba(255,100,100,.35);}

/* ── Surfaces ───────────────────────────────────────────── */
.panel{
  position:relative;
  background:linear-gradient(135deg, rgba(0,0,0,.55) 0%, oklch(0.22 0.010 125 / .6) 100%);
  border:1px solid var(--border-soft);
  border-radius:14px;
  overflow:hidden;
}
.panel::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,.012) 2px 4px);
  z-index:1;
}
.panel.scanlines-off::before{display:none;}
.panel > *{position:relative;z-index:2;}

.panel-accent{
  border-color: color-mix(in oklch, var(--accent) 25%, var(--border-soft));
  box-shadow: 0 0 0 1px color-mix(in oklch, var(--accent) 8%, transparent), 0 8px 40px rgba(0,0,0,.4);
}
.panel-accent::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 80% 50% at 50% 0%, color-mix(in oklch, var(--accent) 8%, transparent) 0%, transparent 70%);
}

/* corner brackets */
.brackets::before,.brackets::after{
  content:'';position:absolute;width:14px;height:14px;border:1.5px solid color-mix(in oklch, var(--accent) 60%, transparent);pointer-events:none;
}
.brackets::before{top:6px;left:6px;border-right:none;border-bottom:none;}
.brackets::after{bottom:6px;right:6px;border-left:none;border-top:none;}

/* ── Tiny utilities ─────────────────────────────────────── */
.chip{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--border-soft);border-radius:999px;color:var(--fg-2);background:rgba(255,255,255,.04);}
.chip-accent{color:var(--accent);border-color:var(--accent-border);background:var(--accent-bg);}
.chip-green{color:var(--green-soft);border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.08);}
.chip-red{color:var(--red-2);border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.08);}
.chip-amber{color:var(--amber-2);border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.08);}
.chip-blue{color:var(--blue);border-color:rgba(96,165,250,.30);background:rgba(96,165,250,.08);}
.chip-purple{color:var(--purple);border-color:rgba(192,132,252,.30);background:rgba(192,132,252,.08);}

.divider{height:1px;background:linear-gradient(90deg, transparent, color-mix(in oklch, var(--accent) 30%, transparent) 50%, transparent);}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:9px 14px;border-radius:10px;
  font-family:'JetBrains Mono',monospace;font-weight:800;font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;
  border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--fg-2);cursor:pointer;
  transition:all .18s ease;
  user-select:none;
}
.btn:hover{background:rgba(255,255,255,.06);color:var(--fg);}
.btn-red{color:var(--red-2);border-color:rgba(248,113,113,.30);background:rgba(248,113,113,.10);}
.btn-red:hover{background:rgba(248,113,113,.18);color:#fff;}
.btn-orange{color:#fdba74;border-color:rgba(251,146,60,.30);background:rgba(251,146,60,.10);}
.btn-orange:hover{background:rgba(251,146,60,.18);color:#fff;}
.btn-green{color:var(--green-soft);border-color:rgba(74,222,128,.30);background:rgba(74,222,128,.10);}
.btn-green:hover{background:rgba(74,222,128,.18);color:#fff;}
.btn-cyan{
  color:#67e8f9;border:1px solid rgba(34,211,238,.4);
  background:linear-gradient(180deg,#164e63 0%,#0e3a4a 60%,#0a2d3a 100%);
  box-shadow:0 4px 0 0 #061e27, 0 0 12px rgba(34,211,238,.18), inset 0 1px 0 rgba(255,255,255,.07);
}
.btn-cyan:hover{filter:brightness(1.15);}
.btn-cyan:active{transform:translateY(1px);box-shadow:0 1px 0 0 #061e27, 0 0 8px rgba(34,211,238,.18);}
.btn-icon{padding:0;width:36px;height:36px;}

.metric-tile{
  background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  padding:14px 16px;
  position:relative;
  overflow:hidden;
}
.metric-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600;color:var(--fg-4);text-transform:uppercase;letter-spacing:.2em;margin-bottom:10px;}
.metric-value{font-family:'Share Tech Mono','JetBrains Mono',monospace;font-size:26px;font-weight:800;letter-spacing:-.01em;line-height:1;color:var(--fg);}
.metric-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-4);text-transform:uppercase;letter-spacing:.12em;margin-top:6px;}

/* ── Pulsing orb ─────────────────────────────────────────── */
.orb{position:relative;width:40px;height:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.orb .core{width:14px;height:14px;border-radius:50%;background:var(--green);box-shadow:0 0 18px var(--green);}
.orb .ping{position:absolute;inset:0;border-radius:50%;background:var(--green);opacity:.25;animation:ping 2.5s ease-out infinite;}
.orb .blur{position:absolute;inset:4px;border-radius:50%;background:var(--green);opacity:.35;filter:blur(5px);}
@keyframes ping{0%{transform:scale(.8);opacity:.45}80%,100%{transform:scale(2.2);opacity:0}}
.orb.amber .core{background:var(--amber-2);box-shadow:0 0 18px var(--amber-2);}
.orb.amber .ping,.orb.amber .blur{background:var(--amber-2);}
.orb.red .core{background:var(--red-2);box-shadow:0 0 18px var(--red-2);}
.orb.red .ping,.orb.red .blur{background:var(--red-2);}

/* ── Reticle ─────────────────────────────────────────────── */
.reticle{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:.18;}
.reticle.off{display:none;}
.reticle svg{width:120%;height:120%;}
.reticle .ring-rotate{animation:rRotate 45s linear infinite;transform-origin:center;}
.reticle .ring-rotate-rev{animation:rRotateRev 30s linear infinite;transform-origin:center;}
@keyframes rRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes rRotateRev{from{transform:rotate(360deg)}to{transform:rotate(0)}}

/* ── HUD progress bar (entry/SL/TP) ─────────────────────── */
.hud-prog{position:relative;height:6px;border-radius:3px;background:linear-gradient(90deg,#7f1d1d 0%,#3a1212 18%,#1d1d1d 30%,#1d1d1d 70%,#0e3326 82%,#065f46 100%);overflow:visible;}
.hud-prog .marker{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--green);box-shadow:0 0 10px var(--green);transform:translate(-50%,-50%);transition:left .8s cubic-bezier(.22,.9,.3,1);}
.hud-prog .tick{position:absolute;top:-3px;width:1px;height:12px;background:rgba(255,255,255,.3);}

/* ── Animations ─────────────────────────────────────────── */
@keyframes flashGreen{0%{background:rgba(0,255,170,0)}20%{background:rgba(0,255,170,.18)}100%{background:rgba(0,255,170,0)}}
@keyframes flashRed{0%{background:rgba(248,113,113,0)}20%{background:rgba(248,113,113,.18)}100%{background:rgba(248,113,113,0)}}
.flash-green{animation:flashGreen .9s ease-out;}
.flash-red{animation:flashRed .9s ease-out;}

@keyframes barShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.2}}
.cursor-blink{animation:blink 1s steps(2) infinite;}

@keyframes radarSweep{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── Layout ─────────────────────────────────────────────── */
.shell{max-width:1320px;margin:0 auto;padding:24px 28px 60px;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0 22px;border-bottom:1px solid var(--border-soft);margin-bottom:24px;}
.topbar .brand{display:flex;align-items:center;gap:14px;}
.brand-mark{width:34px;height:34px;border:1px solid var(--accent-border);border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--accent-bg);}
.brand-name{font-family:'Share Tech Mono',monospace;font-size:15px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg);}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-4);letter-spacing:.18em;text-transform:uppercase;}

.nav{display:flex;align-items:center;gap:4px;}
.nav a{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);padding:8px 12px;border-radius:8px;text-decoration:none;border:1px solid transparent;}
.nav a:hover{color:var(--fg);background:rgba(255,255,255,.04);}
.nav a.active{color:var(--accent);border-color:var(--accent-border);background:var(--accent-bg);}

/* page header */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:22px;}
.page-title{display:flex;align-items:center;gap:18px;}
.page-title .icon{width:54px;height:54px;border:1px solid var(--amber-border);border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(251,191,36,.06);}
.page-title h1{font-family:'Share Tech Mono',monospace;font-size:32px;letter-spacing:.2em;text-transform:uppercase;margin:0;line-height:1;color:var(--amber);text-shadow:0 0 14px rgba(251,191,36,.35);}
.page-title .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg-3);letter-spacing:.18em;text-transform:uppercase;margin-top:6px;}
.page-title h1.live{color:var(--red);text-shadow:0 0 14px rgba(248,113,113,.45);}

.layout-grid{display:grid;grid-template-columns:1.6fr .9fr;gap:18px;align-items:start;}
.layout-grid.single{grid-template-columns:1fr;}
.col{display:flex;flex-direction:column;gap:18px;min-width:0;}

@media (max-width: 980px){
  .shell{padding:14px 14px 80px;}
  .topbar{flex-wrap:wrap;}
  .nav{order:3;width:100%;overflow-x:auto;padding-bottom:4px;}
  .nav a{flex-shrink:0;}
  .layout-grid{grid-template-columns:1fr;}
  .page-title h1{font-size:24px;}
  .metric-value{font-size:22px;}
}

/* Section header inside panel */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border-soft);}
.sec-title{font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg);display:flex;align-items:center;gap:10px;}
.sec-title .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}

/* No scrollbar utility */
.no-scrollbar::-webkit-scrollbar{display:none;}
.no-scrollbar{scrollbar-width:none;}

/* density */
.density-sparse .metric-tile{padding:18px 20px;}
.density-sparse .metric-value{font-size:30px;}
.density-dense .metric-tile{padding:10px 12px;}
.density-dense .metric-value{font-size:22px;}
.density-dense .metric-label{margin-bottom:6px;}

/* Position card */
.pos{
  position:relative;padding:14px 16px;border:1px solid var(--border-soft);border-radius:12px;
  background:linear-gradient(180deg, rgba(0,0,0,.45), rgba(0,0,0,.25));
  cursor:pointer;transition:border-color .2s ease, transform .2s ease;
  overflow:hidden;
}
.pos:hover{border-color:var(--accent-border);}

/* History */
.hist{padding:11px 14px;border:1px solid var(--border-soft);border-radius:12px;background:rgba(0,0,0,.3);cursor:pointer;transition:border-color .2s ease;}
.hist:hover{border-color:var(--border);}
.hist.expanded{border-color:var(--accent-border);background:rgba(0,0,0,.45);box-shadow:0 0 18px color-mix(in oklch, var(--accent) 7%, transparent);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{width:100%;max-width:480px;background:linear-gradient(180deg, oklch(0.20 0.010 125), oklch(0.16 0.010 125));border:1px solid var(--accent-border);border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 1px color-mix(in oklch, var(--accent) 15%, transparent);}

/* ── HUD overlays toggle ─────────────────────────────────── */
.hud-overlays-off .reticle{display:none;}
.hud-overlays-off .panel::before{display:none;}
.hud-overlays-off .corner-tag{display:none;}
.hud-overlays-off .brackets::before,.hud-overlays-off .brackets::after{display:none;}

/* corner tags */
.corner-tag{position:absolute;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--fg-4);letter-spacing:.18em;text-transform:uppercase;z-index:3;pointer-events:none;}
.corner-tag.tl{top:8px;left:14px;}
.corner-tag.tr{top:8px;right:14px;color:var(--accent);}
.corner-tag.br{bottom:8px;right:14px;}

/* equity line */
.eq-svg{width:100%;height:80px;display:block;}

/* Watchlist symbol */
.watch-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px dashed var(--border-soft);}
.watch-row:last-child{border-bottom:none;}

/* Scan log row */
.log-row{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--fg-2);padding:5px 0;display:grid;grid-template-columns:64px 60px 1fr auto;gap:10px;align-items:center;}
.log-row .t{color:var(--fg-4);}
.log-row .pass{color:var(--green-soft);}
.log-row .rej{color:var(--fg-4);}
.log-row .sym{color:var(--fg);font-weight:700;}

/* radar */
.radar-wrap{position:relative;width:100%;aspect-ratio:1/1;max-width:240px;margin:0 auto;}
.radar-sweep{animation:radarSweep 4s linear infinite;transform-origin:center;}

/* selection cosmetic */
::selection{background:color-mix(in oklch, var(--accent) 50%, transparent);color:#000;}

</style></head><body>
<div class="tactical-bg" id="tactical-bg"><div class="glow"></div><div class="grid"></div><div class="grain"></div><div class="scanline"></div></div>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">

// ── Tactical Background controller ──────────────────────────
function applyTweaks(t, pageAccent){
  const root = document.documentElement;
  // page accent override wins unless tweak forces a theme
  const accents = {
    green: { c:'#00ffaa', bg:'rgba(0,255,170,.10)', bd:'rgba(0,255,170,.30)' },
    amber: { c:'#fbbf24', bg:'rgba(251,191,36,.10)', bd:'rgba(251,191,36,.35)' },
    blue:  { c:'#60a5fa', bg:'rgba(96,165,250,.10)', bd:'rgba(96,165,250,.30)' },
    cyan:  { c:'#22d3ee', bg:'rgba(34,211,238,.10)',  bd:'rgba(34,211,238,.30)' },
    purple:{ c:'#c084fc', bg:'rgba(192,132,252,.10)', bd:'rgba(192,132,252,.30)' },
    red:   { c:'#f87171', bg:'rgba(248,113,113,.10)', bd:'rgba(248,113,113,.35)' },
  };
  const themeKey = (t.theme === 'page') ? pageAccent : t.theme;
  const a = accents[themeKey] || accents[pageAccent] || accents.green;
  root.style.setProperty('--accent', a.c);
  root.style.setProperty('--accent-bg', a.bg);
  root.style.setProperty('--accent-border', a.bd);

  const bg = document.getElementById('tactical-bg');
  if (bg) bg.classList.toggle('off', !t.tacticalBg);

  document.body.classList.toggle('hud-overlays-off', !t.hudOverlays);

  document.body.classList.remove('density-sparse','density-balanced','density-dense');
  document.body.classList.add('density-' + (t.density || 'balanced'));
}

// ── Formatters ──────────────────────────────────────────────
function fmtMoney(v, d){ d = d == null ? 2 : d; return (v<0?'-$':'$') + Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtPct(v, d){ d = d == null ? 2 : d; return (v>=0?'+':'') + v.toFixed(d) + '%'; }
function fmtPrice(p){ if(p<1) return '$'+p.toFixed(5); if(p<100) return '$'+p.toFixed(4); return '$'+p.toFixed(2); }
function fmtDur(seconds){
  if (seconds<60) return seconds+'s';
  if (seconds<3600) return Math.floor(seconds/60)+'m '+(seconds%60)+'s';
  const h=Math.floor(seconds/3600), m=Math.floor((seconds%3600)/60);
  return h+'h '+m+'m';
}
function fmtNum(v){
  if (Math.abs(v) >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(2)+'M';
  if (Math.abs(v) >= 1e3) return (v/1e3).toFixed(2)+'K';
  return v.toFixed(2);
}

function EquityCurve({ trades, initial }){
  const W=800, H=180, padL=4, padR=10, padT=10, padB=20;
  const { eqPts, ddPts } = useMemo(()=>{
    let eq = initial, peak = initial;
    const eqPts = [{x:0,y:eq,dd:0}];
    [...trades].reverse().forEach((t,i)=>{
      eq += t.pnl;
      peak = Math.max(peak, eq);
      eqPts.push({x:i+1, y:eq, dd: peak>0 ? -((peak-eq)/peak)*100 : 0});
    });
    return { eqPts, ddPts: eqPts };
  },[trades, initial]);
  const minY = Math.min(...eqPts.map(p=>p.y));
  const maxY = Math.max(...eqPts.map(p=>p.y));
  const yRng = maxY-minY || 1;
  const last = eqPts[eqPts.length-1];
  const isUp = last.y >= initial;
  const stroke = isUp?'var(--green-soft)':'var(--red-2)';

  const xOf = i => padL + (i/(eqPts.length-1))*(W-padL-padR);
  const yOf = y => padT + (1-(y-minY)/yRng)*(H-padT-padB);

  const line = eqPts.map((p,i)=>(i?'L':'M')+xOf(p.x).toFixed(1)+' '+yOf(p.y).toFixed(1)).join(' ');
  const area = line + ` L ${xOf(eqPts.length-1).toFixed(1)} ${H-padB} L ${padL} ${H-padB} Z`;

  // drawdown overlay
  const minDD = Math.min(...eqPts.map(p=>p.dd));
  const ddH = 60;
  const ddYof = dd => H + 8 + (-dd/Math.abs(minDD||1))*ddH;
  const ddPath = eqPts.map((p,i)=>(i?'L':'M')+xOf(p.x).toFixed(1)+' '+ddYof(p.dd).toFixed(1)).join(' ');
  const ddArea = ddPath + ` L ${xOf(eqPts.length-1).toFixed(1)} ${H+8} L ${padL} ${H+8} Z`;

  return (
    <svg viewBox={`0 0 ${W} ${H+8+ddH+12}`} style={{width:'100%',height:'auto'}}>
      <defs>
        <linearGradient id="eqg2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={stroke} stopOpacity=".25"/>
          <stop offset="100%" stopColor={stroke} stopOpacity="0"/>
        </linearGradient>
        <linearGradient id="ddg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--red-2)" stopOpacity=".05"/>
          <stop offset="100%" stopColor="var(--red-2)" stopOpacity=".25"/>
        </linearGradient>
      </defs>
      {/* gridlines */}
      {[0,.25,.5,.75,1].map(g=>(<line key={g} x1={padL} x2={W-padR} y1={padT+g*(H-padT-padB)} y2={padT+g*(H-padT-padB)} stroke="rgba(255,255,255,.05)" strokeDasharray="2 3"/>))}
      {/* equity */}
      <path d={area} fill="url(#eqg2)"/>
      <path d={line} stroke={stroke} strokeWidth="1.6" fill="none"/>
      <text x={padL+4} y={padT+10} fill="var(--fg-4)" fontSize="9" fontFamily="JetBrains Mono,monospace" letterSpacing=".18em">EQUITY</text>
      <text x={W-padR} y={padT+10} fill={stroke} fontSize="11" fontFamily="JetBrains Mono,monospace" textAnchor="end" fontWeight="700">{SS.fmtMoney(last.y)}</text>
      {/* drawdown panel */}
      <path d={ddArea} fill="url(#ddg)"/>
      <path d={ddPath} stroke="var(--red-2)" strokeWidth="1.2" fill="none" opacity=".8"/>
      <text x={padL+4} y={H+18} fill="var(--fg-4)" fontSize="9" fontFamily="JetBrains Mono,monospace" letterSpacing=".18em">DRAWDOWN</text>
      <text x={W-padR} y={H+18} fill="var(--red-2)" fontSize="11" fontFamily="JetBrains Mono,monospace" textAnchor="end" fontWeight="700">{minDD.toFixed(2)}%</text>
    </svg>
  );
}

        const bd = v>=0 ? `rgba(34,197,94,.5)` : `rgba(248,113,113,.5)`;
        return (
          <div key={d} style={{background:bg, border:`1px solid ${bd}`, borderRadius:4, padding:'8px 6px', textAlign:'center'}}>
            <div className="mono" style={{fontSize:9,color:'var(--fg-4)',letterSpacing:'.1em'}}>{d.slice(5)}</div>
            <div className="mono" style={{fontSize:12,fontWeight:800,color:v>=0?'var(--green-soft)':'var(--red-2)',marginTop:2}}>{v>=0?'+':''}{v.toFixed(0)}</div>
          </div>
        );
      })}
    </div>
  );
}

function TradeTable({ trades, onSelect, sortKey, setSortKey, sortDir, setSortDir, query, setQuery }){
  const sorted = useMemo(()=>{
    let arr = trades.filter(t => !query || t.sym.toLowerCase().includes(query.toLowerCase()) || t.setup.toLowerCase().includes(query.toLowerCase()) || t.tags.join(' ').toLowerCase().includes(query.toLowerCase()));
    arr = [...arr].sort((a,b) => {
      const A = a[sortKey], B = b[sortKey];
      if (typeof A === 'number') return (B-A)*(sortDir==='asc'?-1:1);
      return String(A).localeCompare(String(B))*(sortDir==='asc'?1:-1);
    });
    return arr;
  }, [trades, query, sortKey, sortDir]);
  const headers = [
    { k:'date', l:'DATE' },
    { k:'sym',  l:'SYMBOL' },
    { k:'dir',  l:'DIR' },
    { k:'setup',l:'SETUP' },
    { k:'pnl',  l:'P&L' },
    { k:'rr',   l:'R' },
    { k:'mfe',  l:'MFE' },
    { k:'mae',  l:'MAE' },
    { k:'dur',  l:'DUR' },
  ];
  const onSort = (k) => {
    if (sortKey===k) setSortDir(sortDir==='asc'?'desc':'asc');
    else { setSortKey(k); setSortDir('desc'); }
  };
  return (
    <>
      <div style={{padding:'10px 18px',borderBottom:'1px solid var(--border-soft)',display:'flex',gap:8,alignItems:'center'}}>
        <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="// filter symbol, setup, tag..." style={{flex:1,background:'rgba(0,0,0,.4)',border:'1px solid var(--border-soft)',color:'var(--fg)',padding:'8px 12px',borderRadius:6,fontFamily:'JetBrains Mono,monospace',fontSize:11,letterSpacing:'.05em',outline:'none'}}/>
        <SS.Chip>{sorted.length} TRADES</SS.Chip>
      </div>
      <div style={{maxHeight:520,overflowY:'auto'}}>
        <div style={{display:'grid',gridTemplateColumns:'90px 1fr 50px 1fr 80px 50px 50px 50px 60px 1fr 70px',gap:8,padding:'10px 18px',fontFamily:'JetBrains Mono,monospace',fontSize:9,color:'var(--fg-4)',letterSpacing:'.18em',textTransform:'uppercase',position:'sticky',top:0,background:'var(--card)',zIndex:1,borderBottom:'1px solid var(--border-soft)'}}>
          {headers.map(h => (
            <span key={h.k} onClick={()=>onSort(h.k)} style={{cursor:'pointer',color:sortKey===h.k?'var(--accent)':'var(--fg-4)'}}>
              {h.l}{sortKey===h.k?(sortDir==='asc'?' ↑':' ↓'):''}
            </span>
          ))}
          <span>TAGS</span>
          <span style={{textAlign:'right'}}>EXIT</span>
        </div>
        {sorted.map(tr => {
          const profit = tr.pnl>=0;
          return (
            <div key={tr.id} onClick={()=>onSelect(tr)} style={{display:'grid',gridTemplateColumns:'90px 1fr 50px 1fr 80px 50px 50px 50px 60px 1fr 70px',gap:8,padding:'10px 18px',borderBottom:'1px solid var(--border-soft)',cursor:'pointer',alignItems:'center',fontFamily:'JetBrains Mono,monospace',fontSize:11,transition:'background .15s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,.03)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}>
              <span style={{color:'var(--fg-3)'}}>{tr.date.slice(5)}</span>
              <span style={{color:'var(--fg)',fontWeight:600,letterSpacing:'.04em'}}>{tr.sym}</span>
              <span style={{color:tr.dir==='LONG'?'var(--green-soft)':'var(--red-2)',fontWeight:700}}>{tr.dir==='LONG'?'▲L':'▼S'}</span>
              <span style={{color:'var(--fg-2)',fontSize:10}}>{tr.setup}</span>
              <span style={{color:profit?'var(--green-soft)':'var(--red-2)',fontWeight:800}}>{(profit?'+':'')+SS.fmtMoney(tr.pnl)}</span>
              <span style={{color:tr.rr>=1?'var(--green-soft)':'var(--red-2)'}}>{tr.rr>=0?'+':''}{tr.rr.toFixed(1)}R</span>
              <span style={{color:'var(--green-soft)'}}>{tr.mfe.toFixed(2)}</span>
              <span style={{color:'var(--red-2)'}}>{tr.mae.toFixed(2)}</span>
              <span style={{color:'var(--fg-3)'}}>{tr.dur}m</span>
              <span style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                {tr.tags.map(t=>(<span key={t} className="chip" style={{fontSize:8,padding:'1px 5px'}}>{t}</span>))}
              </span>
              <span style={{color:'var(--fg-4)',fontSize:9,textAlign:'right',letterSpacing:'.1em'}}>{tr.exit.replace(/_/g,' ').toUpperCase()}</span>
            </div>
          );
        })}
      </div>
    </>
  );
}

function TradeDetail({ trade, onClose, notes, setNotes }){
  if (!trade) return null;
  const profit = trade.pnl>=0;
  return (
    <SS.Modal onClose={onClose} maxWidth={680}>
      <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border-soft)',background:'rgba(0,0,0,.4)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <SS.Chip kind={trade.dir==='LONG'?'green':'red'}>{trade.dir==='LONG'?'▲':'▼'} {trade.dir}</SS.Chip>
          <span style={{fontFamily:'Share Tech Mono,monospace',fontSize:18,letterSpacing:'.08em'}}>{trade.sym}</span>
          <SS.Chip>{trade.setup}</SS.Chip>
          <SS.Chip kind={profit?'green':'red'}>{profit?'+':''}{SS.fmtMoney(trade.pnl)} · {SS.fmtPct(trade.pnl_pct)}</SS.Chip>
        </div>
        <button className="btn" style={{padding:'6px 10px'}} onClick={onClose}>✕</button>
      </div>
      <div style={{padding:'14px 18px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div>
          <div className="mono" style={{fontSize:9,color:'var(--fg-4)',letterSpacing:'.18em',textTransform:'uppercase',marginBottom:8}}>// EXECUTION</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div className="metric-tile"><div className="metric-label">P&L</div><div className="metric-value" style={{color:profit?'var(--green-soft)':'var(--red-2)'}}>{(profit?'+':'')+SS.fmtMoney(trade.pnl)}</div></div>
            <div className="metric-tile"><div className="metric-label">R</div><div className="metric-value" style={{color:trade.rr>=1?'var(--green-soft)':'var(--red-2)'}}>{trade.rr>=0?'+':''}{trade.rr.toFixed(2)}R</div></div>
            <div className="metric-tile"><div className="metric-label">MFE</div><div className="metric-value" style={{color:'var(--green-soft)'}}>+{trade.mfe.toFixed(2)}%</div></div>
            <div className="metric-tile"><div className="metric-label">MAE</div><div className="metric-value" style={{color:'var(--red-2)'}}>-{trade.mae.toFixed(2)}%</div></div>
            <div className="metric-tile"><div className="metric-label">Duration</div><div className="metric-value">{trade.dur}m</div></div>
            <div className="metric-tile"><div className="metric-label">Confidence</div><div className="metric-value" style={{color:'var(--accent)'}}>{trade.conf}</div></div>
          </div>
        </div>
        <div>
          <div className="mono" style={{fontSize:9,color:'var(--fg-4)',letterSpacing:'.18em',textTransform:'uppercase',marginBottom:8}}>// EFFICIENCY</div>
          <div style={{padding:14,border:'1px solid var(--border-soft)',borderRadius:8,background:'rgba(0,0,0,.3)'}}>
            <div style={{position:'relative',height:14,background:'rgba(0,0,0,.4)',border:'1px solid var(--border-soft)',borderRadius:3,marginBottom:6}}>
              <div style={{position:'absolute',top:0,bottom:0,left:'50%',width:1,background:'rgba(255,255,255,.2)'}}/>
              <div style={{position:'absolute',top:0,bottom:0,left:'50%',width:Math.min(50,(trade.mfe/4)*50)+'%',background:'rgba(34,197,94,.55)',borderRadius:'0 2px 2px 0'}}/>
              <div style={{position:'absolute',top:0,bottom:0,right:'50%',width:Math.min(50,(trade.mae/4)*50)+'%',background:'rgba(248,113,113,.55)',borderRadius:'2px 0 0 2px'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,fontFamily:'JetBrains Mono,monospace'}}>
              <span style={{color:'var(--red-2)'}}>MAE -{trade.mae.toFixed(2)}%</span>
              <span style={{color:'var(--fg-4)'}}>ENTRY</span>
              <span style={{color:'var(--green-soft)'}}>MFE +{trade.mfe.toFixed(2)}%</span>
            </div>
            <div style={{marginTop:14,fontSize:11,color:'var(--fg-3)',lineHeight:1.5}}>
              Captured <b style={{color:'var(--green-soft)'}}>{((trade.pnl_pct/trade.mfe)*100).toFixed(0)}%</b> of max favorable excursion.
              {trade.mae > Math.abs(trade.pnl_pct) && <> Stop sat through <b style={{color:'var(--red-2)'}}>{trade.mae.toFixed(2)}%</b> drawdown.</>}
            </div>
          </div>
          <div className="mono" style={{fontSize:9,color:'var(--fg-4)',letterSpacing:'.18em',textTransform:'uppercase',marginTop:14,marginBottom:8}}>// TAGS</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {trade.tags.map(tg => <SS.Chip key={tg}>{tg}</SS.Chip>)}
            {trade.tags.length===0 && <span style={{fontSize:11,color:'var(--fg-4)'}}>// no tags</span>}
            <SS.Chip kind="accent" style={{cursor:'pointer'}}>+ ADD</SS.Chip>
          </div>
        </div>
      </div>
      <div style={{padding:'14px 18px',borderTop:'1px solid var(--border-soft)'}}>
        <div className="mono" style={{fontSize:9,color:'var(--fg-4)',letterSpacing:'.18em',textTransform:'uppercase',marginBottom:8}}>// JOURNAL ENTRY</div>
        <textarea
          value={notes[trade.id]||''}
          onChange={e=>setNotes({...notes,[trade.id]:e.target.value})}
          placeholder="// what worked, what didn't, lesson..."
          style={{width:'100%',minHeight:80,background:'rgba(0,0,0,.4)',border:'1px solid var(--border-soft)',borderRadius:6,color:'var(--fg)',padding:10,fontFamily:'JetBrains Mono,monospace',fontSize:11,lineHeight:1.5,outline:'none',resize:'vertical'}}
        />
      </div>
    </SS.Modal>
  );
}

function App(){
  const [t, setTweak] = window.useTweaks({
    ...SS.SHARED_TWEAK_DEFAULTS,
    groupBy: 'setup',  // 'setup' | 'symbol'
    timeRange: '7d',
  });
  useEffect(()=>{ SS.applyTweaks(t, 'green'); }, [t]);

  const [now, setNow] = useState(Date.now());
  const [trades] = useState(TRADES_SEED);
  const [selected, setSelected] = useState(null);
  const [notes, setNotes] = useState({});
  const [sortKey, setSortKey] = useState('date');
  const [sortDir, setSortDir] = useState('desc');
  const [query, setQuery] = useState('');

  useEffect(()=>{
    const id = setInterval(()=>setNow(Date.now()), 1000);
    return ()=>clearInterval(id);
  }, []);

  // Stats
  const wins = trades.filter(x=>x.pnl>0);
  const losses = trades.filter(x=>x.pnl<=0);
  const winRate = (wins.length/trades.length)*100;
  const totalPnl = trades.reduce((a,x)=>a+x.pnl,0);
  const avgWin = wins.length ? wins.reduce((a,x)=>a+x.pnl,0)/wins.length : 0;
  const avgLoss = losses.length ? Math.abs(losses.reduce((a,x)=>a+x.pnl,0))/losses.length : 0;
  const profitFactor = avgLoss>0 ? (avgWin*wins.length)/(avgLoss*losses.length) : Infinity;
  const expectancy = (winRate/100)*avgWin - (1-winRate/100)*avgLoss;
  const avgR = trades.reduce((a,x)=>a+x.rr,0)/trades.length;
  const avgMfe = trades.reduce((a,x)=>a+x.mfe,0)/trades.length;
  const avgMae = trades.reduce((a,x)=>a+x.mae,0)/trades.length;
  const avgDur = trades.reduce((a,x)=>a+x.dur,0)/trades.length;

  // Group breakdown
  const groups = useMemo(()=>{
    const map = {};
    trades.forEach(tr => {
      const k = tr[t.groupBy === 'symbol' ? 'sym' : 'setup'];
      if (!map[k]) map[k] = { k, n:0, wins:0, pnl:0, sumR:0 };
      map[k].n++; map[k].pnl += tr.pnl; map[k].sumR += tr.rr;
      if (tr.pnl>0) map[k].wins++;
    });
    return Object.values(map).sort((a,b)=>b.pnl-a.pnl);
  }, [trades, t.groupBy]);

  return (
    <div className="shell">
      <SS.Topbar active="journal" now={now}/>
      <SS.PageHead
        icon={<svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <rect x="4" y="3" width="14" height="18" rx="1.5" stroke="var(--green)" strokeWidth="1.7"/>
          <line x1="8" y1="7" x2="14" y2="7" stroke="var(--green)" strokeWidth="1.5"/>
          <line x1="8" y1="11" x2="14" y2="11" stroke="var(--green)" strokeWidth="1.5"/>
          <line x1="8" y1="15" x2="11" y2="15" stroke="var(--green)" strokeWidth="1.5"/>
          <circle cx="20" cy="20" r="3" stroke="var(--accent)" strokeWidth="1.4"/>
          <line x1="22" y1="22" x2="24" y2="24" stroke="var(--accent)" strokeWidth="1.4"/>
        </svg>}
        title="Journal"
        subtitle={`${trades.length} closed trades · ${t.timeRange} window`}
        badges={<>
          <SS.Chip kind={totalPnl>=0?'green':'red'}>NET {totalPnl>=0?'+':''}{SS.fmtMoney(totalPnl)}</SS.Chip>
          <SS.Chip kind="green">WR {winRate.toFixed(0)}%</SS.Chip>
          <SS.Chip kind="accent">PF {profitFactor.toFixed(2)}</SS.Chip>
        </>}
      />

      {/* Stats command center */}
      <section className="panel panel-accent" style={{marginBottom:18}}>
        <SS.Reticle/>
        <div className="corner-tag tl">// PERFORMANCE-METRICS</div>
        <div className="corner-tag tr">{t.timeRange.toUpperCase()} WINDOW</div>
        <div style={{padding:'22px 22px 18px'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(8, minmax(0,1fr))',gap:10,marginBottom:18}}>
            <StatTile label="Net P&L"     value={(totalPnl>=0?'+':'')+SS.fmtMoney(totalPnl)} sub="across all closed" color={totalPnl>=0?'var(--green-soft)':'var(--red-2)'} big/>
            <StatTile label="Win Rate"    value={winRate.toFixed(1)+'%'} sub={wins.length+' / '+trades.length} color="var(--green-soft)" big/>
            <StatTile label="Profit Fctr" value={profitFactor.toFixed(2)} sub={profitFactor>1.5?'healthy':profitFactor>1?'thin':'losing'} color={profitFactor>1.5?'var(--green-soft)':profitFactor>1?'var(--amber)':'var(--red-2)'} big/>
            <StatTile label="Avg R"       value={(avgR>=0?'+':'')+avgR.toFixed(2)+'R'} sub="per trade" color={avgR>=0?'var(--green-soft)':'var(--red-2)'} big/>
            <StatTile label="Expectancy"  value={(expectancy>=0?'+':'')+SS.fmtMoney(expectancy)} sub="per trade EV" color={expectancy>=0?'var(--green-soft)':'var(--red-2)'} big/>
            <StatTile label="Avg Win"     value={'+'+SS.fmtMoney(avgWin)} sub={wins.length+' wins'} color="var(--green-soft)"/>
            <StatTile label="Avg Loss"    value={'-'+SS.fmtMoney(avgLoss)} sub={losses.length+' losses'} color="var(--red-2)"/>
            <StatTile label="Avg Duration"value={avgDur.toFixed(0)+'m'} sub={'MFE '+avgMfe.toFixed(2)+'% / MAE '+avgMae.toFixed(2)+'%'} color="var(--fg)"/>
          </div>

          <div style={{paddingTop:14,borderTop:'1px solid var(--border-soft)'}}>
            <div className="mono" style={{fontSize:10,color:'var(--fg-4)',letterSpacing:'.20em',textTransform:'uppercase',marginBottom:10}}>// EQUITY · DRAWDOWN</div>
            <EquityCurve trades={trades} initial={5000}/>
          </div>
        </div>
      </section>

      <div className="layout-grid">
        {/* Trades table */}
        <div className="col">
          <section className="panel">
            <SS.SectionHead title="Trade Log" right={<>
              <SS.Chip kind="accent">SORT · {sortKey.toUpperCase()} {sortDir==='desc'?'↓':'↑'}</SS.Chip>
            </>}/>
            <TradeTable
              trades={trades}
              onSelect={setSelected}
              sortKey={sortKey} setSortKey={setSortKey}
              sortDir={sortDir} setSortDir={setSortDir}
              query={query} setQuery={setQuery}
            />
          </section>

          <section className="panel">
            <SS.SectionHead title="P&L Calendar" right={<SS.Chip>DAILY</SS.Chip>}/>
            <div style={{padding:'14px 18px'}}>
              <PnLCalendar trades={trades}/>
            </div>
          </section>
        </div>

        {/* Right rail */}
        <div className="col">
          <section className="panel">
            <SS.SectionHead title={`Per-${t.groupBy === 'symbol' ? 'Symbol' : 'Setup'} Breakdown`} right={
              <div style={{display:'flex',gap:6}}>
                <button className={`btn ${t.groupBy==='setup'?'btn-cyan':''}`} style={{padding:'4px 10px',fontSize:10}} onClick={()=>setTweak('groupBy','setup')}>SETUP</button>
                <button className={`btn ${t.groupBy==='symbol'?'btn-cyan':''}`} style={{padding:'4px 10px',fontSize:10}} onClick={()=>setTweak('groupBy','symbol')}>SYMBOL</button>
              </div>
            }/>
            <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:10}}>
              {groups.map(g => {
                const wr = (g.wins/g.n)*100;
                const profit = g.pnl>=0;
                const max = Math.max(...groups.map(x=>Math.abs(x.pnl)));
                const w = (Math.abs(g.pnl)/max)*100;
                return (
                  <div key={g.k} style={{padding:'10px 12px',border:'1px solid var(--border-soft)',borderRadius:8,background:'rgba(0,0,0,.3)',position:'relative',overflow:'hidden'}}>
                    <div style={{position:'absolute',top:0,bottom:0,left:0,width:w+'%',background:profit?'rgba(34,197,94,.05)':'rgba(248,113,113,.05)',borderRight:`1px solid ${profit?'rgba(34,197,94,.3)':'rgba(248,113,113,.3)'}`}}/>
                    <div style={{position:'relative',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                      <span style={{fontFamily:'Share Tech Mono,monospace',fontSize:13,letterSpacing:'.06em'}}>{g.k}</span>
                      <span className="mono" style={{fontSize:13,fontWeight:800,color:profit?'var(--green-soft)':'var(--red-2)'}}>{(profit?'+':'')+SS.fmtMoney(g.pnl)}</span>
                    </div>
                    <div style={{position:'relative',display:'flex',justifyContent:'space-between',fontSize:10,fontFamily:'JetBrains Mono,monospace',color:'var(--fg-4)',letterSpacing:'.14em'}}>
                      <span>{g.n} TRADES</span>
                      <span style={{color:wr>=60?'var(--green-soft)':wr>=40?'var(--amber)':'var(--red-2)'}}>WR {wr.toFixed(0)}%</span>
                      <span>AVG {(g.sumR/g.n).toFixed(2)}R</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </section>

          <section className="panel">
            <SS.SectionHead title="Tag Cloud" right={<SS.Chip>{Object.keys([...trades].reduce((a,t)=>{t.tags.forEach(tg=>a[tg]=true);return a;},{})).length} TAGS</SS.Chip>}/>
            <div style={{padding:'14px 18px'}}>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {Object.entries(trades.reduce((a,t)=>{t.tags.forEach(tg=>a[tg]=(a[tg]||{count:0,pnl:0}, {count:(a[tg]?.count||0)+1, pnl:(a[tg]?.pnl||0)+t.pnl}));return a;},{})).sort((a,b)=>b[1].count-a[1].count).map(([tag,d])=>(
                  <div key={tag} style={{padding:'8px 12px',border:`1px solid ${d.pnl>=0?'rgba(34,197,94,.4)':'rgba(248,113,113,.4)'}`,borderRadius:6,background:d.pnl>=0?'rgba(34,197,94,.08)':'rgba(248,113,113,.08)',display:'flex',flexDirection:'column',gap:2}}>
                    <span className="mono" style={{fontSize:11,color:'var(--fg)',fontWeight:700,letterSpacing:'.05em'}}>{tag}</span>
                    <span className="mono" style={{fontSize:9,color:'var(--fg-4)'}}>{d.count} · <span style={{color:d.pnl>=0?'var(--green-soft)':'var(--red-2)'}}>{(d.pnl>=0?'+':'')+SS.fmtMoney(d.pnl)}</span></span>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section className="panel">
            <SS.SectionHead title="Distribution" right={<SS.Chip kind="accent">EFFICIENCY</SS.Chip>}/>
            <div style={{padding:'14px 18px'}}>
              <svg viewBox="0 0 320 140" style={{width:'100%'}}>
                {/* grid */}
                <line x1="20" y1="120" x2="310" y2="120" stroke="rgba(255,255,255,.1)"/>
                <line x1="165" y1="20" x2="165" y2="120" stroke="rgba(255,255,255,.06)" strokeDasharray="2 3"/>
                <text x="20" y="135" fill="var(--fg-4)" fontSize="8" fontFamily="JetBrains Mono,monospace">-2R</text>
                <text x="159" y="135" fill="var(--fg-4)" fontSize="8" fontFamily="JetBrains Mono,monospace">0</text>
                <text x="298" y="135" fill="var(--fg-4)" fontSize="8" fontFamily="JetBrains Mono,monospace">+3R</text>
                {/* trades as dots */}
                {trades.map((tr,i) => {
                  const x = 165 + (tr.rr/3)*145;
                  const y = 110 - (tr.mfe/4)*85;
                  const c = tr.pnl>=0?'#22c55e':'#f87171';
                  return <circle key={i} cx={x} cy={y} r="3.5" fill={c} fillOpacity=".7" stroke={c}/>;
                })}
                <text x="20" y="18" fill="var(--fg-4)" fontSize="9" fontFamily="JetBrains Mono,monospace" letterSpacing=".18em">MFE % ↑ vs R →</text>
              </svg>
            </div>
          </section>
        </div>
      </div>

      <SS.FooterStatus now={now} latency={36}/>

      {selected && <TradeDetail trade={selected} onClose={()=>setSelected(null)} notes={notes} setNotes={setNotes}/>}

      <window.TweaksPanel title="Tweaks" defaultOpen={false}>
        <SS.SharedTweaksControls t={t} setTweak={setTweak}/>
        <window.TweakSection title="Journal">
          <window.TweakRadio label="Time Range" value={t.timeRange} onChange={v=>setTweak('timeRange',v)} options={[
            {label:'24h',value:'24h'},
            {label:'7d', value:'7d'},
            {label:'30d',value:'30d'},
            {label:'All',value:'all'},
          ]}/>
          <window.TweakRadio label="Group By" value={t.groupBy} onChange={v=>setTweak('groupBy',v)} options={[
            {label:'Setup', value:'setup'},
            {label:'Symbol',value:'symbol'},
          ]}/>
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
